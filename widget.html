<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Bot Widget</title>
<style>
  :root{
    --brand:#5b54e8; --brand-2:#7d78f0; --ink:#222033;
    --surface:rgba(255,255,255,.97);
    --dock:rgba(26,28,46,.58);
  }
  html, body { margin:0; height:100%; background:transparent; overflow:hidden;
               font-family:"Noto Sans TC", system-ui, sans-serif; -webkit-font-smoothing:antialiased;
  }
  #stage { position:absolute; inset:0; }
  #avatar-canvas { width:100%; height:100%; display:block; }

/* ===== 底部控制 dock（毛玻璃）===== */
  #control-bar {
    position:absolute; left:50%; bottom:7px; transform:translateX(-50%);
    display:flex; flex-direction:column; gap:4px;
    padding:4px; border-radius:13px;
    background:var(--dock); backdrop-filter:blur(10px) saturate(1.3); -webkit-backdrop-filter:blur(10px) saturate(1.3);
    box-shadow:0 8px 24px rgba(0,0,0,.22), inset 0 0 0 1px rgba(255,255,255,.12);
  }
  .dock-row { display:flex; gap:4px; align-items:center; }
  #type-input {
    flex:1; min-width:0; appearance:none; border:none; outline:none;
    background:rgba(255,255,255,.92);
    color:var(--ink); border-radius:9px;
    height:26px; padding:0 8px;
    font:500 10px "Noto Sans TC", system-ui, sans-serif;
  }
  #type-input::placeholder { color:#888da0; }
  #type-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(91,84,232,.5); }
  .ctrl {
    appearance:none; border:none; cursor:pointer;
    color:#fff; background:rgba(255,255,255,.14);
    height:26px; min-width:26px;
    padding:0 6px; border-radius:9px; flex-shrink:0; white-space:nowrap;
    display:inline-flex; align-items:center; justify-content:center; gap:4px;
    font-size:10px; font-weight:600; line-height:1;
    transition:transform .12s, background .15s, filter .15s;
  }
  .ctrl:hover { background:rgba(255,255,255,.26); }
  .ctrl:active { transform:scale(.93); }
  .ctrl:focus-visible { outline:2px solid #fff; outline-offset:2px; }
  .ctrl.primary { background:linear-gradient(135deg,var(--brand-2),var(--brand)); padding:0 10px; box-shadow:0 3px 10px rgba(0,0,0,.25); }
  .ctrl.primary:hover { filter:brightness(1.1); background:linear-gradient(135deg,var(--brand-2),var(--brand)); }
  .ctrl.listening { background:linear-gradient(135deg,#e74c3c,#c0392b)!important; animation:pulse 1.1s infinite; }
  .ctrl.llm-on { background:linear-gradient(135deg,#f2b34f,#e69426); } 
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,.55);} 50%{ box-shadow:0 0 0 7px rgba(231,76,60,0);} }

  /* ===== 對話泡泡（帶尾巴）===== */
  #bubble {
    position:absolute; right:10px; top:10px; left:10px;
    background:var(--surface); color:var(--ink); border-radius:12px; padding:8px 10px;
    font-size:11px; line-height:1.4;
    box-shadow:0 10px 30px rgba(0,0,0,.18), inset 0 0 0 1px rgba(91,84,232,.1);
    opacity:0; transform:translateY(-8px) scale(.98); transform-origin:top center;
    transition:opacity .22s, transform .22s; pointer-events:none;
  }
  #bubble::after { content:""; position:absolute; right:26px; bottom:-5px; width:10px; height:10px; background:var(--surface); transform:rotate(45deg); }
  #bubble.show { opacity:1; transform:none; }

  /* ===== 範例提示清單 ===== */
  #suggestions {
    position:absolute; left:8px; right:8px; bottom:72px; 
    display:flex; flex-wrap:wrap; gap:4px; justify-content:center; pointer-events:auto;
  }
  #suggestions .sg-label {
    width:100%; text-align:center; font-size:9px; font-weight:600;
    color:#fff; letter-spacing:.3px;
    text-shadow:0 1px 4px rgba(0,0,0,.55); margin-bottom:2px;
  }
  .sugg {
    appearance:none; cursor:pointer; white-space:nowrap;
    background:rgba(255,255,255,.92); color:var(--brand);
    border:1px solid rgba(91,84,232,.22);
    border-radius:999px; font-size:9px; font-weight:600; padding:4px 8px;
    box-shadow:0 3px 10px rgba(0,0,0,.16); transition:transform .12s, background .15s;
  }
  .sugg:hover { background:#fff; transform:translateY(-1px); }
  .sugg:active { transform:scale(.96); }
  .sugg:focus-visible { outline:2px solid #fff; outline-offset:2px; }

  #direct-warn {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    background:#f4f6f8; color:#556; font-size:15px; text-align:center; padding:24px;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="bubble"></div>
    <canvas id="avatar-canvas"></canvas>
    <div id="suggestions"></div>
    <div id="control-bar">
      <div class="dock-row">
        <input id="type-input" type="text" maxlength="200" placeholder="打字問我也可以…" aria-label="輸入文字問題" />
        <button class="ctrl primary" id="btn-send" aria-label="送出文字問題"><span aria-hidden="true">➤</span></button>
      </div>
      <div class="dock-row" role="toolbar" aria-label="虛擬人控制列">
      <button class="ctrl primary" id="btn-mic"   aria-label="開始語音對話"><span aria-hidden="true">🎤</span> 說話</button>
      <button class="ctrl" id="btn-llm" aria-label="啟用瀏覽器內 AI 大腦（首次需下載模型）" aria-pressed="false"><span aria-hidden="true">🧠</span></button>
      <button class="ctrl" id="btn-mute"  aria-label="靜音" aria-pressed="false"><span aria-hidden="true">🔊</span></button>
      <button class="ctrl" id="btn-speed" aria-label="調整語速">1.0×</button>
      <button class="ctrl" id="btn-close" aria-label="收起助理"><span aria-hidden="true">✕</span></button>
      </div>
    </div>
  </div>
  <div id="direct-warn">請透過 <code>embed.js</code> 載入此元件。</div>

  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <script src="knowledge.js"></script>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";
    const LLM_MODEL = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC"; 
    let engine = null, loadingPromise = null;
    window.LLM = {
      supported: ('gpu' in navigator),
      state: 'idle',
      progress: 0,
      model: LLM_MODEL,
      async load(onProgress) {
        if (engine) return engine;
        if (loadingPromise) return loadingPromise;
        window.LLM.state = 'loading';
        loadingPromise = webllm.CreateMLCEngine(LLM_MODEL, {
          initProgressCallback: (p) => { window.LLM.progress = p.progress || 0; if (onProgress) onProgress(p); }
        }).then((e) => { engine = e; window.LLM.state = 'ready'; return e; })
          .catch((err) => { window.LLM.state = 'error'; window.LLM.error = String(err); throw err; });
        return loadingPromise;
      },
      async chat(messages) {
        if (!engine) return null;
        const r = await engine.chat.completions.create({ messages, temperature: 0.4, max_tokens: 220 });
        return r && r.choices && r.choices[0] && r.choices[0].message.content;
      }
    };
  </script>

  <script>
  const CFG = new URLSearchParams(location.search);
  const TTS_ENDPOINT = CFG.get('api') || 'api/tts';  
  const KNOWLEDGE_URL = CFG.get('knowledge') || '';
  if (KNOWLEDGE_URL) { fetch(KNOWLEDGE_URL).then(r => r.json()).then(kb => { if (Array.isArray(kb)) window.KB = kb; }).catch(() => {}); }

  let model = null, app = null;
  let isSpeaking = false;
  let ttsMuted = false, ttsRate = 1.0, ttVoice = null;
  let audioCtx = null;
  let speakSeq = 0, currentSource = null, currentRaf = 0; 
  let neuralDisabled = false;
  const NEURAL_VOICE = CFG.get('voice') || 'zh-TW-HsiaoChenNeural';
  let recognition = null, listening = false;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  const isEmbedded = window.self !== window.top;
  const devBypass  = new URLSearchParams(location.search).has('dev');
  if (!isEmbedded && !devBypass) {
    document.getElementById('stage').style.display = 'none';
    document.getElementById('direct-warn').style.display = 'flex';
  } else {
    bootAvatar();		
  }

  function postToParent(type, payload) {
    try { window.parent.postMessage(Object.assign({ ns: 'avatar-widget', type }, payload || {}), '*'); } catch (e) {}
  }
  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.ns !== 'avatar-widget-host') return;
    if (d.type === 'say') speak(String(d.text || '').slice(0, 600));
  });

  function showBubble(text) {
    const b = document.getElementById('bubble');
    b.textContent = text; 
    b.classList.add('show');
    clearTimeout(showBubble._t);
    const duration = 6000 + (text.length * 100);
    showBubble._t = setTimeout(() => { b.classList.remove('show'); }, duration);
  }

  function loadVoice() {
    const vs = speechSynthesis.getVoices();
    const pick = (re) => vs.find(v => re.test(v.name + ' ' + v.lang) && !/Google/i.test(v.name));
    ttVoice = pick(/(HsiaoChen|HsiaoYu|曉臻|曉雨).*zh/i) || pick(/(Yating|Zhiwei).*zh[-_]TW/i) || pick(/Microsoft.*zh[-_]TW/i) || pick(/zh[-_]TW/i) || pick(/^zh/i) || vs.find(v => /zh/i.test(v.lang)) || null;
  }
  if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = loadVoice; loadVoice(); }

  function stopSpeaking() {
    try { if ('speechSynthesis' in window) speechSynthesis.cancel(); } catch (e) {}
    try { clearInterval(speakBrowser._poll); } catch (e) {}
    if (currentRaf) { cancelAnimationFrame(currentRaf); currentRaf = 0; }
    if (currentSource) { try { currentSource.onended = null; currentSource.stop(); } catch (e) {} currentSource = null; }
    isSpeaking = false;
  }

  function speak(text) {
    const myseq = ++speakSeq;
    showBubble(text);
    postToParent('speaking', { text });
    if (ttsMuted) return;
    stopSpeaking();
    if (neuralDisabled) { speakBrowser(text); return; }   
    speakNeural(text, myseq).catch((e) => {
      if (myseq !== speakSeq) return; 
      const msg = (e && e.message) || '';
      if (/http 4\d\d|Failed to fetch|NetworkError|Load failed/i.test(msg)) neuralDisabled = true;
      console.warn('神經語音失敗，退回瀏覽器語音：', msg);
      speakBrowser(text);
    });
  }

  async function speakNeural(text, seq) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') { try { await audioCtx.resume(); } catch (e) {} }
    const sep = TTS_ENDPOINT.indexOf('?') < 0 ? '?' : '&';
    const resp = await fetch(TTS_ENDPOINT + sep + 'voice=' + encodeURIComponent(NEURAL_VOICE) + '&text=' + encodeURIComponent(text));
    if (seq !== speakSeq) return;                      
    if (!resp.ok) throw new Error('http ' + resp.status);
    const arr = await resp.arrayBuffer();
    if (seq !== speakSeq) return;
    if (arr.byteLength < 800) throw new Error('audio too small');
    const audioBuf = await audioCtx.decodeAudioData(arr);
    if (seq !== speakSeq) return;                       
    const src = audioCtx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(audioCtx.destination);
    currentSource = src;
    isSpeaking = true;
    
    // 移除舊的 Live2D 打字對嘴邏輯 model.motion('Tap')
    
    src.onended = () => {                               
      if (currentSource !== src) return;
      isSpeaking = false;
      currentSource = null;
    };
    src.start(0);
  }

  function speakBrowser(text) {
    if (ttsMuted || !('speechSynthesis' in window)) return;
    const u = new SpeechSynthesisUtterance(text);
    if (!ttVoice) loadVoice();
    if (ttVoice) u.voice = ttVoice;
    u.lang = (ttVoice && ttVoice.lang) || 'zh-TW';
    u.rate = ttsRate; u.pitch = 1.0;
    u.onend = () => { isSpeaking = false; clearInterval(speakBrowser._poll); };
    const fire = () => {
      speechSynthesis.speak(u);
      isSpeaking = true;
      const t0 = performance.now();
      clearInterval(speakBrowser._poll);
      speakBrowser._poll = setInterval(() => {
        const elapsed = performance.now() - t0;
        const active = speechSynthesis.speaking || speechSynthesis.pending;
        if ((elapsed > 1000 && !active) || elapsed > 16000) { isSpeaking = false; clearInterval(speakBrowser._poll); }
      }, 150);
    };
    if (speechSynthesis.speaking || speechSynthesis.pending) { speechSynthesis.cancel(); setTimeout(fire, 130); }
    else fire();
  }

  function bigrams(s) {
    s = (s || '').toLowerCase().replace(/[\s，。、？！,.?!~～]/g, '');
    const g = [];
    for (let i = 0; i < s.length - 1; i++) g.push(s.slice(i, i + 2));
    if (s.length === 1) g.push(s);
    return g;
  }
  function similarity(query, text) {
    const A = bigrams(query), B = new Set(bigrams(text));
    if (!A.length || !B.size) return 0;
    let hit = 0; for (const x of A) if (B.has(x)) hit++;
    return hit / Math.sqrt(A.length * B.size);
  }
  function scoreEntry(q, e) {
    let score = Math.max(similarity(q, e.q), similarity(q, e.kw || ''));
    const terms = (e.kw || '').split(/\s+/).filter(Boolean);
    for (const t of terms) { if (t.length >= 2 && q.includes(t)) score = Math.max(score, 0.5 + t.length * 0.04); }
    return score;
  }
  function topK(q, k) {
    return (window.KB || []).map(e => ({ e, s: scoreEntry(q, e) }))
      .sort((a, b) => b.s - a.s).slice(0, k).filter(x => x.s > 0.05).map(x => x.e);
  }
  function brain(qRaw) {
    const q = (qRaw || '').trim();
    if (!q) return '我好像沒聽清楚，可以再說一次嗎？';
    let best = null, bestScore = 0;
    for (const e of (window.KB || [])) { const s = scoreEntry(q, e); if (s > bestScore) { bestScore = s; best = e; } }
    if (best && bestScore >= 0.16) return best.a;
    return '你問的是「' + q + '」對吧？這題我的知識庫還沒有 會在更新這些喔。';
  }
  async function answer(q) {
    q = (q || '').trim();
    if (!q) return '我好像沒聽清楚，可以再說一次嗎？';
    if (window.LLM && window.LLM.state === 'ready') {
      const ctx = topK(q, 3).map(e => 'Q：' + e.q + '\nA：' + e.a).join('\n---\n');
      const messages = [
        { role: 'system', content: '你是「可嵌入任何網站的語音虛擬人元件」的示範助手。主題是導遊「介紹釜山 歷史 人文 氣候 旅遊 購物」。請用繁體中文、口語、最多兩三句話簡短回答。優先依據【參考資料】回答；資料沒有的就用常識簡短回應，不確定就老實說不知道。\n\n【參考資料】\n' + (ctx || '（無）') },
        { role: 'user', content: q }
      ];
      try {
        showBubble('讓我想想…');
        const out = await window.LLM.chat(messages);
        if (out && out.trim()) return out.trim();
      } catch (e) { console.warn('LLM error', e); }
    }
    return brain(q);
  }

  function handleUser(text) {
    if (text) showBubble('你：' + text);
    Promise.resolve().then(async () => { speak(await answer(text)); });
  }

  function setMic(on) {
    const b = document.getElementById('btn-mic');
    b.classList.toggle('listening', on);
    b.textContent = on ? '● 聆聽中' : '🎤 說話';
    const sg = document.getElementById('suggestions');
    if (sg) sg.style.display = on ? 'none' : 'flex'; 
  }
  function startListening() {
    if (!SR) { speak('你的瀏覽器不支援語音辨識，建議用 Chrome 開喔。'); return; }
    if (listening && recognition) { recognition.stop(); return; }
    try { recognition = new SR(); } catch (e) { speak('語音辨識啟動失敗：' + e.message); return; }
    recognition.lang = 'zh-TW'; recognition.interimResults = true;
    recognition.continuous = false; recognition.maxAlternatives = 1;
    recognition.onstart  = () => { listening = true; setMic(true); showBubble('聆聽中…請說話 🎙️'); };
    recognition.onresult = (e) => {
      let txt = '';
      for (const r of e.results) txt += r[0].transcript;
      const last = e.results[e.results.length - 1];
      if (last.isFinal) handleUser(txt.trim());
      else showBubble('「' + txt + '」…');
    };
    recognition.onerror = (e) => { listening = false; setMic(false); showBubble(e.error === 'not-allowed' ? '我需要麥克風權限才能聽你說話喔。' : '沒聽清楚（' + e.error + '），再試一次。'); };
    recognition.onend   = () => { listening = false; setMic(false); };
    try { recognition.start(); } catch (e) {}
  }

  // ===== 連續圖載入與設定 (最終修復版) =====
  async function bootAvatar() {
    try {
      app = new PIXI.Application({
        view: document.getElementById('avatar-canvas'),
        autoStart: true, 
        backgroundAlpha: 0, 
        antialias: true,
        resizeTo: document.getElementById('stage'),
      });

      const imagePaths = [
        'seagulf.png',
        'seagulf1.png',
        'seagulf2.png',
        'seagulf3.png',
        'seagulf4.png'
      ];

      // 使用 PIXI.Texture.fromURL 等待圖片解析完畢，徹底解決 Loader 漏抓尺寸問題
      const textures = [];
      for (const path of imagePaths) {
        try {
          const tex = await PIXI.Texture.fromURL(path);
          textures.push(tex);
        } catch (imgErr) {
          console.error(`圖片 ${path} 載入失敗。請檢查檔名或是否有 CORS 限制。`, imgErr);
          showBubble(`圖片載入失敗，請按 F12 查看控制台`);
          return; // 若缺少圖片直接中斷，避免產生空精靈報錯
        }
      }

      model = new PIXI.AnimatedSprite(textures);
      model.animationSpeed = 1 / 60; // 1秒1張
      model.play();
      model.anchor.set(0.5, 1.0); 
      app.stage.addChild(model);

      function fit() {
        const w = app.renderer.width, h = app.renderer.height;
        if (w === 0 || h === 0) return;
        
        const nativeH = textures[0].height || 1000;
        model.scale.set((h / nativeH) * 0.95);
        model.x = w / 2;
        model.y = h;
      }
      
      // 強制執行幾次 fit，預防 iframe 剛展開時寬高為 0 的空窗期
      fit(); 
      setTimeout(fit, 100);
      setTimeout(fit, 500);
      
      window.addEventListener('resize', fit);

      model.interactive = true;
      model.buttonMode = true;
      model.on('pointerdown', () => onTap());
      document.getElementById('avatar-canvas').addEventListener('pointerdown', onTap);

      setTimeout(() => showBubble('妳好🎤 歡迎 👋'), 700);
      postToParent('ready');
      window.__avatarModel = model;

    } catch (err) {
      console.error(err);
      postToParent('error', { message: err.message });
    }
  }

  function onTap() {
    if (onTap._lock) return;
    onTap._lock = true;
    setTimeout(() => { onTap._lock = false; }, 400);
    // 移除了舊的 Live2D 動作 model.motion('Tap')
    speak('你好～可以問我釜山相關問題！');
  }

  // ===== 控制列 =====
  document.getElementById('btn-close').onclick = () => postToParent('close');
  (function renderSuggestions() {
    const box = document.getElementById('suggestions');
    if (!box) return;
    const SUGGESTIONS = ['禮儀？', '歷史？', '季節？', '汗蒸幕？'];
    const label = document.createElement('div'); label.className = 'sg-label'; label.textContent = '💬 你可以問我：';
    box.appendChild(label);
    SUGGESTIONS.forEach((s) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'sugg'; b.textContent = s;
      b.onclick = () => handleUser(s.replace(/？$/, ''));
      box.appendChild(b);
    });
  })();
  (function bindTyping() {
    const ti = document.getElementById('type-input');
    const send = () => { const t = ti.value.trim(); if (!t) return; ti.value = ''; handleUser(t); };
    document.getElementById('btn-send').onclick = send;
    ti.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.isComposing && e.keyCode !== 229) { e.preventDefault(); send(); }
    });
  })();
  document.getElementById('btn-mic').onclick   = () => startListening();
  document.getElementById('btn-mute').onclick  = () => {
    ttsMuted = !ttsMuted;
    const mb = document.getElementById('btn-mute');
    mb.textContent = ttsMuted ? '🔇' : '🔊';
    mb.setAttribute('aria-pressed', String(ttsMuted));
    if (ttsMuted) stopSpeaking();
    showBubble(ttsMuted ? '已靜音' : '已開啟語音');
  };
  document.getElementById('btn-speed').onclick = () => {
    const steps = [0.9, 1.0, 1.2, 1.4];
    ttsRate = steps[(steps.indexOf(ttsRate) + 1) % steps.length] || 1.0;
    document.getElementById('btn-speed').textContent = ttsRate.toFixed(1) + '×';
    showBubble('語速：' + ttsRate.toFixed(1) + '×');
  };
  document.getElementById('btn-llm').onclick = async () => {
    const btn = document.getElementById('btn-llm');
    if (!window.LLM || !window.LLM.supported) { showBubble('這個裝置不支援 WebGPU，先用知識庫模式就好（功能一樣可用）。'); return; }
    if (window.LLM.state === 'ready')   { showBubble('AI 大腦已啟用，問我問題吧 🧠'); return; }
    if (window.LLM.state === 'loading') { showBubble('AI 大腦載入中… ' + Math.round(window.LLM.progress * 100) + '%'); return; }
    showBubble('開始下載 AI 大腦（約 1GB，只需第一次）…');
    try {
      await window.LLM.load((p) => { btn.textContent = '🧠 ' + Math.round((p.progress || 0) * 100) + '%'; });
      btn.textContent = '🧠✓'; btn.classList.add('llm-on');
      speak('AI 大腦啟用完成，現在我可以聊得更自然囉！');
